<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Webルーレット</title>

<style>
body {
  background: white;
  text-align: center;
  font-family: sans-serif;
}

#wrapper {
  position: relative;
  width: 320px;
  margin: 40px auto;
}

/* 外枠リング */
#wrapper::before {
  content: "";
  position: absolute;
  width: 340px;
  height: 340px;
  top: -10px;
  left: -10px;
  border-radius: 50%;
  background: conic-gradient(
    #f3c6a5 0deg 72deg,
    #b266ff 72deg 144deg,
    #66a3ff 144deg 216deg,
    #ff6666 216deg 288deg,
    #66ff99 288deg 360deg
  );
  z-index: 0;
}

#wheel {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  border: 6px solid #333;
  position: relative;
  z-index: 1;
}

#pointer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border-top: 15px solid transparent;
  border-bottom: 15px solid transparent;
  border-left: 35px solid red;
  z-index: 10;
}

.sliceText {
  position: absolute;
  left: 50%;
  top: 50%;
  transform-origin: 0 0;
  font-size: 18px;
  font-weight: bold;
  width: 120px;
  text-align: center;
}

/* ★結果オーバーレイ */
#overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  background: red;
  color: white;
  font-size: 32px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;

  opacity: 0;
  pointer-events: none;
  transition: 0.2s;
}

#overlay.show {
  opacity: 1;
}

/* ボタン */
.startBtn, .resetBtn {
  padding: 10px 20px;
  margin: 5px;
  font-size: 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.startBtn { background: #6aa9ff; color: white; }
.resetBtn { background: #ff8a8a; color: white; }

#editorArea {
  margin: 10px auto;
  width: 320px;
}

#modeBtn {
  position: fixed;
  bottom: 10px;
  right: 10px;
  font-size: 12px;
}

#status {
  position: fixed;
  bottom: 10px;
  left: 10px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<h2>Webルーレット</h2>

<div id="wrapper">
  <div id="wheel"></div>
  <div id="pointer"></div>

  <!-- ★被せ表示 -->
  <div id="overlay"></div>
</div>

<div>
  <button class="startBtn" onclick="spin()">開始</button>
  <button class="resetBtn" onclick="resetWheel()">リセット</button>
</div>

<div id="editorArea">
  <textarea id="inputItems" rows="4" cols="30">あ
い
う
え</textarea>
</div>

<button id="modeBtn">モード: ランダム</button>
<p id="status">ランダム</p>

<script>
let items = ["あ","い","う","え"];
let deg = 0;

let mode = "random";
let forcedIndex = 0;

const colors = ["#ff6666","#ff9966","#ffcc66","#ccff66","#66ffcc","#66ccff","#6699ff","#9966ff"];

function createWheel() {
  const wheel = document.getElementById("wheel");
  wheel.innerHTML = "";

  const step = 360 / items.length;
  let gradient = "conic-gradient(";

  for (let i = 0; i < items.length; i++) {
    const start = i * step;
    const end = start + step;

    gradient += `${colors[i % colors.length]} ${start}deg ${end}deg`;
    if (i !== items.length - 1) gradient += ",";

    const text = document.createElement("div");
    text.className = "sliceText";
    text.innerText = items[i];

    const angle = start + step / 2;
    const radius = 90;

    text.style.transform =
      `rotate(${angle}deg) translate(${radius}px) rotate(-${angle}deg) translate(-50%, -50%)`;

    wheel.appendChild(text);
  }

  gradient += ")";
  wheel.style.background = gradient;
}

// 入力
document.getElementById("inputItems").addEventListener("input", () => {
  const input = document.getElementById("inputItems").value;
  items = input.split(/\n|,/).map(s => s.trim()).filter(s => s);

  if (items.length >= 2) {
    forcedIndex = 0;
    createWheel();
  }
});

// モード
document.getElementById("modeBtn").onclick = () => {
  mode = (mode === "random") ? "fixed" : "random";
  updateStatus();
};

function updateStatus() {
  document.getElementById("modeBtn").textContent =
    "モード: " + (mode === "fixed" ? "固定" : "ランダム");

  document.getElementById("status").textContent =
    mode === "fixed" ? "固定: " + items[forcedIndex] : "ランダム";
}

// ★回転
function spin() {
  // ★毎回オーバーレイ消す
  document.getElementById("overlay").classList.remove("show");

  let targetIndex;

  if (mode === "fixed") {
    targetIndex = forcedIndex;
  } else {
    targetIndex = Math.floor(Math.random() * items.length);
  }

  const step = 360 / items.length;
  const targetAngle = -(targetIndex * step + step / 2);

  let speed = 30;

  const interval = setInterval(() => {
    speed *= 0.97;
    deg += speed;

    document.getElementById("wheel").style.transform =
      `rotate(${deg}deg)`;

    if (speed < 0.5) {
      clearInterval(interval);

      deg = Math.round(deg) + targetAngle;

      document.getElementById("wheel").style.transform =
        `rotate(${deg}deg)`;

      // ★結果を被せ表示
      const overlay = document.getElementById("overlay");
      overlay.textContent = items[targetIndex];
      overlay.classList.add("show");
    }
  }, 20);
}

// リセット
function resetWheel() {
  deg = 0;
  document.getElementById("wheel").style.transform = "rotate(0deg)";
  document.getElementById("overlay").classList.remove("show");
}

createWheel();
updateStatus();
</script>

</body>
</html>
